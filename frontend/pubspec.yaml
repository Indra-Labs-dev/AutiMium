name: automium
description: AutoMium - Personal Pentesting & Malware Analysis Tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # UI Components
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  
  # Utilities
  file_picker: ^6.1.1
  url_launcher: ^6.2.2
  intl: ^0.18.1
  pdf: ^3.10.7
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
